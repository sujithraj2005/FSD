<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link rel="stylesheet" href="css.css">
</head>

<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="#">Register</a>
    </nav>
    <form action="dashboard.html" onsubmit="return registerUser()">
        <label for="username">Username
            <input type="text" id="username" name="username" required>
        </label><br><br>
        <label for="email">Email
            <input type="email" id="email" name="email" required>
        </label><br><br>
        <label for="password">Password
            <input type="password" id="password" name="password" required>
        </label><br><br>
        <label for="re-password">Re-type Password
            <input type="password" id="re-password" name="re-password" required>
        </label><br><br>
        <button type="submit">Register</button>
        <p><small>Already have an account? <a href="login.html">Login</a></small></p>
    </form>
    <script src="script.js"></script>
</body>

</html>
