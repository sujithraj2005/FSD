<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Grid System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container">

        <h2 class="text-center my-4">
            Bootstrap Grid System
        </h2>

        <div class="row">
            <div class="col-md-6">
                <div class="bg-info text-white p-3 text-center">
                    Left Section
                </div>
            </div>

            <div class="col-md-6">
                <div class="bg-warning p-3 text-center">
                    Right Section
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="bg-secondary text-white p-3 text-center">
                    Column A
                </div>
            </div>

            <div class="col-md-4">
                <div class="bg-success text-white p-3 text-center">
                    Column B
                </div>
            </div>

            <div class="col-md-4">
                <div class="bg-danger text-white p-3 text-center">
                    Column C
                </div>
            </div>
        </div>

    </div>

</body>
</html>
