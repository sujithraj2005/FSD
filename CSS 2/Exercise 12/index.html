<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <style>
        body{
            background-color: white;
        }
        .box{
        height: 250px;
        width: 100px;
        background-color: black;
        position: absolute;
        z-index: 1;
        border-radius: 10px;
    }
    .red{
        animation: redbutton 6s linear 0s infinite ;
        position: relative;
        background-color: red;
        z-index: 2;
        left: 25px;
        top: 25px;
        height: 50px;
        width: 50px;
        border-radius: 50%;
    }
    @keyframes redbutton{
        33.3%{
            background-color: red;
        }
        33.4%,100%{
            background-color: white;
        }
    }
    .yellow{
        animation: yellowbutton 6s linear 0s infinite ;
        position: relative;
        background-color: yellow;
        z-index: 2;
        left: 25px;
        top: 40px;
        height: 50px;
        width: 50px;
        border-radius: 50%;
    }
    @keyframes yellowbutton{
        0%,33.3%{
            background-color: white;
        }
        33.4%,66.6%{
            background-color: yellow;
        }
        66.7%,100%{
            background-color: white;
        }
    }
    .green{
        animation: greenbutton 6s linear 0s infinite ;
        position: relative;
        background-color: green;
        z-index: 2;
        left: 25px;
        top: 55px;
        height: 50px;
        width: 50px;
        border-radius: 50%;
    }
    @keyframes greenbutton{
        0%,66.6%{
            background-color:white;
        }
        66.7%,100%{
            background-color:  green;
        }
        
    }
    </style>
</head>
<body>
    <div class="box">
        <div class="red"></div>
        <div class="yellow"></div>
        <div class="green"></div>
    </div>
</body>
</html>
