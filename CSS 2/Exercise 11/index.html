<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Text</title>
<style>
  .wel {
    font-size: 48px;
    font-weight: bold;
    display: flex;
    gap: 5px;
  }

  .wel span {
    display: inline-block;
    animation: bouncing 1s ease-in-out infinite;
  }

  /* Delay each letter slightly */
  .wel span:nth-child(1) { animation-delay: 0s; }
  .wel span:nth-child(2) { animation-delay: 0.1s; }
  .wel span:nth-child(3) { animation-delay: 0.2s; }
  .wel span:nth-child(4) { animation-delay: 0.3s; }
  .wel span:nth-child(5) { animation-delay: 0.4s; }
  .wel span:nth-child(6) { animation-delay: 0.5s; }
  .wel span:nth-child(7) { animation-delay: 0.6s; }

  @keyframes bouncing {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); } /* Moves letter up */
  }
</style>
</head>
<body>
  <div class="wel">
    <span>W</span>
    <span>E</span>
    <span>L</span>
    <span>C</span>
    <span>O</span>
    <span>M</span>
    <span>E</span>
  </div>
</body>
</html>
