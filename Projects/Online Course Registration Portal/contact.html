<!DOCTYPE html>
<html>
<head>

<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h1>Contact Us</h1>

<form>

<input type="text"
class="form-control mb-3"
placeholder="Name">

<input type="email"
class="form-control mb-3"
placeholder="Email">

<input type="text"
class="form-control mb-3"
placeholder="Subject">

<textarea
class="form-control mb-3"
placeholder="Message">
</textarea>

<button class="btn btn-primary">
Send
</button>

</form>

<h3 class="mt-5">
Google Map
</h3>

<div class="border p-5 text-center">
Map Placeholder
</div>

<h4 class="mt-4">
Address Information
</h4>

<p>ABC Institute</p>
<p>Hyderabad</p>
<p>9876543210</p>
<p>abc@gmail.com</p>

</div>

</body>
</html>
