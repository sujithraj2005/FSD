<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Student Portal</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="dashboard.html">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="profile.html">Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="register.html">Register</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">

    <h2 class="text-center mb-4">Student Dashboard</h2>

    <!-- Statistics Cards -->

    <div class="row g-4 mb-4">

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Total Students</h5>
                    <h2 class="text-primary">500</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Present Students</h5>
                    <h2 class="text-success">450</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Absent Students</h5>
                    <h2 class="text-danger">50</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Placements</h5>
                    <h2 class="text-warning">320</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Search Box -->

    <div class="mb-3">
        <input type="text"
               class="form-control"
               id="searchInput"
               placeholder="Search Student...">
    </div>

    <!-- Student Table -->

    <div class="table-responsive">

        <table class="table table-bordered table-hover bg-white" id="studentTable">

            <thead class="table-dark">
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Branch</th>
                    <th>Attendance</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>101</td>
                    <td>Rahul</td>
                    <td>CSE</td>
                    <td><span class="badge bg-success">92%</span></td>
                </tr>

                <tr>
                    <td>102</td>
                    <td>Anjali</td>
                    <td>ECE</td>
                    <td><span class="badge bg-primary">88%</span></td>
                </tr>

                <tr>
                    <td>103</td>
                    <td>Ramesh</td>
                    <td>EEE</td>
                    <td><span class="badge bg-warning text-dark">75%</span></td>
                </tr>

                <tr>
                    <td>104</td>
                    <td>Priya</td>
                    <td>CSE</td>
                    <td><span class="badge bg-success">95%</span></td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>
const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("keyup", function() {

    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#studentTable tbody tr");

    rows.forEach(row => {

        let text = row.textContent.toLowerCase();

        row.style.display =
        text.includes(filter) ? "" : "none";

    });

});
</script>

</body>
</html>
